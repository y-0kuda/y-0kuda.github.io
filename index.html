<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yutaro Okuda</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- TOP NAV -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="メニューを開く">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <a
        href="#"
        class="topbar-brand"
        onclick="
          navigate('introduction');
          return false;
        "
        >📘 My Docs</a
      >
      <div class="topbar-search">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input
          type="text"
          placeholder="search documents..."
          id="search-input"
          autocomplete="off"
        />
        <div class="search-controls" id="search-controls">
          <span class="search-count" id="search-count"></span>
          <button class="search-nav-btn" id="search-prev" title="前へ" disabled>
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <span
            style="
              width: 1px;
              background: var(--color-border);
              align-self: stretch;
              flex-shrink: 0;
            "
          ></span>
          <button class="search-nav-btn" id="search-next" title="次へ" disabled>
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
          <button class="search-clear-btn" id="search-clear" title="クリア">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="overlay" id="overlay"></div>

    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">ABOUT</div>
          <ul class="sidebar-nav" id="nav">
            <li>
              <a href="#" data-page="introduction" class="active"
                >Introduction</a
              >
            </li>
          </ul>
          <div class="sidebar-title">Articles</div>
          <ul class="sidebar-nav" id="nav">
            <li>
              <a href="#" data-page="bridge">Bridge Enginner</a>
            </li>
            <li>
              <a href="#" data-page="atcoder">AtCoder</a>
            </li>
          </ul>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main">
        <div class="content">
          <div class="article-section active" id="page-introduction">
            <p>Loading...</p>
          </div>
          <div class="article-section" id="page-bridge"><p>Loading...</p></div>
        </div>
        <!-- /.content -->
      </main>
    </div>

    <!-- スクロールトップボタン -->
    <button class="scroll-top" id="scroll-top" aria-label="ページトップへ">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </button>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      const hamburger = document.getElementById("hamburger");
      const scrollTopBtn = document.getElementById("scroll-top");
      const searchInput = document.getElementById("search-input");
      const searchControls = document.getElementById("search-controls");
      const searchCount = document.getElementById("search-count");
      const searchPrev = document.getElementById("search-prev");
      const searchNext = document.getElementById("search-next");
      const searchClear = document.getElementById("search-clear");

      // ===== ハンバーガーメニュー =====
      hamburger.addEventListener("click", () => {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("active");
      });

      overlay.addEventListener("click", closeSidebar);

      function closeSidebar() {
        sidebar.classList.remove("open");
        overlay.classList.remove("active");
      }

      // ===== ページコンテンツの読み込み =====
      const pageOriginals = {};

      const PAGES = [
        { id: "introduction", file: "pages/introduction.html" },
        { id: "bridge", file: "pages/bridge.html" },
        { id: "atcoder", file: "pages/atcoder.html" },
      ];

      async function loadPages() {
        const content = document.querySelector(".content");
        const refs = {};
        PAGES.forEach(({ id }, i) => {
          const el = document.querySelector("#page-" + id);
          refs[id] = { el, active: i === 0 };
        });

        await Promise.all(
          PAGES.map(({ id, file }) =>
            fetch(file, { cache: "no-store" })
              .then((r) => r.text())
              .then((html) => {
                let { el, active } = refs[id];
                if (!el || !el.isConnected) {
                  el = document.createElement("div");
                  el.id = "page-" + id;
                  el.className = "article-section" + (active ? " active" : "");
                  content.appendChild(el);
                }
                el.innerHTML = html;
              })
              .catch((err) => console.error("fetch failed:", id, err)),
          ),
        );
        document.querySelectorAll(".article-section").forEach((sec) => {
          pageOriginals[sec.id] = sec.innerHTML;
        });
      }

      loadPages();

      // ===== ナビゲーション =====
      function navigate(page) {
        clearSearch();
        document
          .querySelectorAll(".article-section")
          .forEach((s) => s.classList.remove("active"));
        document
          .querySelectorAll(".sidebar-nav a")
          .forEach((a) => a.classList.remove("active"));
        const section = document.getElementById("page-" + page);
        if (section) section.classList.add("active");
        const link = document.querySelector(
          '.sidebar-nav a[data-page="' + page + '"]',
        );
        if (link) link.classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
        closeSidebar();
      }

      document.addEventListener("click", (e) => {
        if (e.target.closest("#search-controls")) return;
        const link = e.target.closest("[data-page]");
        if (link) {
          e.preventDefault();
          navigate(link.dataset.page);
          return;
        }
        const inlineLink = e.target.closest("[data-link]");
        if (inlineLink) {
          e.preventDefault();
          navigate(inlineLink.dataset.link);
        }
      });

      // ===== スクロールトップ =====
      window.addEventListener("scroll", () => {
        scrollTopBtn.classList.toggle("visible", window.scrollY > 300);
      });
      scrollTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      // ===== 全文検索 =====
      let allHits = [];
      let currentHit = -1;

      function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function highlightInNode(node, regex) {
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          regex.lastIndex = 0;
          if (!regex.test(text)) return;
          regex.lastIndex = 0;
          const frag = document.createDocumentFragment();
          let last = 0,
            m;
          while ((m = regex.exec(text)) !== null) {
            if (m.index > last)
              frag.appendChild(
                document.createTextNode(text.slice(last, m.index)),
              );
            const mark = document.createElement("mark");
            mark.className = "search-hit";
            mark.textContent = m[0];
            frag.appendChild(mark);
            last = regex.lastIndex;
          }
          if (last < text.length)
            frag.appendChild(document.createTextNode(text.slice(last)));
          node.parentNode.replaceChild(frag, node);
          return;
        }
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName;
          if (
            tag === "MARK" ||
            tag === "SCRIPT" ||
            tag === "STYLE" ||
            tag === "PRE"
          )
            return;
          Array.from(node.childNodes).forEach((child) =>
            highlightInNode(child, regex),
          );
        }
      }

      function runSearch(q) {
        document.querySelectorAll(".article-section").forEach((sec) => {
          sec.innerHTML = pageOriginals[sec.id];
        });
        allHits = [];
        currentHit = -1;

        if (!q) {
          searchControls.classList.remove("visible");
          searchCount.classList.remove("visible");
          searchCount.classList.remove("no-match");
          return;
        }

        const regex = new RegExp(escapeRegex(q), "gi");
        document.querySelectorAll(".article-section").forEach((sec) => {
          highlightInNode(sec, regex);
        });

        allHits = Array.from(
          document.querySelectorAll(".article-section mark.search-hit"),
        );
        searchControls.classList.add("visible");
        searchCount.classList.add("visible");

        if (allHits.length === 0) {
          searchCount.textContent = "0件";
          searchCount.classList.add("no-match");
          searchPrev.disabled = true;
          searchNext.disabled = true;
        } else {
          searchCount.classList.remove("no-match");
          currentHit = 0;
          jumpTo(currentHit);
        }
      }

      function jumpTo(index) {
        if (!allHits.length) return;
        allHits.forEach((m) => m.classList.remove("current"));
        const mark = allHits[index];
        const section = mark.closest(".article-section");
        if (section && !section.classList.contains("active")) {
          document
            .querySelectorAll(".article-section")
            .forEach((s) => s.classList.remove("active"));
          document
            .querySelectorAll(".sidebar-nav a")
            .forEach((a) => a.classList.remove("active"));
          section.classList.add("active");
          const pageId = section.id.replace("page-", "");
          const navLink = document.querySelector(
            '.sidebar-nav a[data-page="' + pageId + '"]',
          );
          if (navLink) navLink.classList.add("active");
        }
        mark.classList.add("current");
        mark.scrollIntoView({ behavior: "smooth", block: "center" });
        searchCount.textContent = index + 1 + " / " + allHits.length + "件";
        searchCount.classList.remove("no-match");
        searchPrev.disabled = index <= 0;
        searchNext.disabled = index >= allHits.length - 1;
      }

      function clearSearch() {
        searchInput.value = "";
        document.querySelectorAll(".article-section").forEach((sec) => {
          sec.innerHTML = pageOriginals[sec.id];
        });
        allHits = [];
        currentHit = -1;
        searchControls.classList.remove("visible");
        searchCount.classList.remove("visible");
        searchCount.classList.remove("no-match");
      }

      let debounceTimer;
      searchInput.addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => runSearch(e.target.value.trim()), 200);
      });

      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          if (e.shiftKey) {
            if (currentHit > 0) {
              currentHit--;
              jumpTo(currentHit);
            }
          } else {
            if (currentHit < allHits.length - 1) {
              currentHit++;
              jumpTo(currentHit);
            }
          }
        }
        if (e.key === "Escape") {
          clearSearch();
          searchInput.blur();
        }
      });

      searchNext.addEventListener("click", () => {
        if (currentHit < allHits.length - 1) {
          currentHit++;
          jumpTo(currentHit);
        }
      });
      searchPrev.addEventListener("click", () => {
        if (currentHit > 0) {
          currentHit--;
          jumpTo(currentHit);
        }
      });
      searchClear.addEventListener("click", () => {
        clearSearch();
        searchInput.focus();
      });
    </script>
  </body>
</html>
